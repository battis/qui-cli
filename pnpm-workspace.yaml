publicHoistPattern:
  - '*eslint*'
  - '*prettier*'
  - '@commitlint/*'
  - commit-and-tag-version
  - lerna
  - monorepo-package-paths
  - npm-run-all
allowBuilds:
  esbuild: true
  nx: true
packages:
  - packages/*
  - examples/*
  - '!examples/02 Reusable Plugin'
  - 'examples/02 Reusable Plugin/*'
  - '!examples/dev-plugin'
  - examples/dev-plugin/*
  - '!examples/dev-sequenced-commands'
  - examples/dev-sequenced-commands/*
  - '!examples/dev-peer-of-peer'
  - examples/dev-peer-of-peer/*
minimumReleaseAgeExclude:
  - '@battis/*'
  - '@qui-cli/*'
